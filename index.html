<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" defer src="./js/main.js"></script>
    <link rel="stylesheet" href="./css/style.css" />

    <link rel="icon" href="./img/favicon.png" type="image/png" />
  </head>

  <body>
    <player>
      <img />
      <div></div>
    </player>

    <track-block>
      <track-info>
        <div><track-album></track-album> • <track-year></track-year></div>
        <div><track-artist></track-artist> — <track-title></track-title></div>
      </track-info>
      <volume>
        <input
          type="range"
          id="volumeSlider"
          class="volume-slider"
          min="0"
          max="100"
          value="100"
          step="1"
        />
      </volume>
    </track-block>

    <control>
      <control-button>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="m10.939 14.98l3.836-2.47q.292-.183.292-.508t-.292-.512l-3.837-2.47q-.298-.212-.618-.037t-.32.546v4.942q0 .371.32.546t.618-.036M12.003 21q-1.866 0-3.51-.708q-1.643-.709-2.859-1.924t-1.925-2.856T3 12.003t.709-3.51Q4.417 6.85 5.63 5.634t2.857-1.925T11.997 3t3.51.709q1.643.708 2.859 1.922t1.925 2.857t.709 3.509t-.708 3.51t-1.924 2.859t-2.856 1.925t-3.509.709M12 20q3.35 0 5.675-2.325T20 12t-2.325-5.675T12 4T6.325 6.325T4 12t2.325 5.675T12 20m0-8"
          />
        </svg>
      </control-button>
    </control>
    <audio src="https://radio.laapl.ru/stream" hidden></audio>
  </body>
</html>
