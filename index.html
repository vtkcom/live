<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" defer src="./js/main.js"></script>
  </head>

  <body>
    <loader></loader>

    <player>
      <control>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            fill-rule="evenodd"
            d="M19.5 14.598c2-1.155 2-4.041 0-5.196l-9-5.196C8.5 3.05 6 4.494 6 6.804v10.392c0 2.31 2.5 3.753 4.5 2.598z"
            clip-rule="evenodd"
          />
        </svg>
      </control>
      <img />
      <div></div>
    </player>

    <track-block>
      <track-info>
        <div><track-album></track-album> • <track-year></track-year></div>
        <div><track-artist></track-artist> — <track-title></track-title></div>
      </track-info>
      <volume>
        <input type="range" min="0" max="100" value="100" step="1" />
      </volume>
    </track-block>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
