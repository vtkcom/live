<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" defer src="./js/main.js"></script>
  </head>

  <body>
    <loader></loader>

    <error style="display: none">
      <h2>Внезапная поломка</h2>
      <p>Чтобы найти волну заново, нажми на кнопку ниже</p>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M5.489 16.512q-1.314-1.316-2.017-2.99T2.769 10t.703-3.521q.703-1.675 2.017-2.992l.661.662Q4.975 5.325 4.338 6.838T3.7 10t.638 3.163T6.15 15.85zm2.3-2.3q-.838-.843-1.279-1.928q-.44-1.087-.44-2.283q0-1.197.44-2.283q.441-1.087 1.279-1.93l.661.662q-.725.725-1.087 1.638T7 10t.363 1.913T8.45 13.55zm3.711 5.904v-8.277q-.637-.147-1.03-.656q-.393-.51-.393-1.183q0-.808.558-1.365q.557-.558 1.365-.558t1.366.558t.557 1.365q0 .673-.393 1.183t-1.03.656v8.277zm4.712-5.904l-.662-.662q.725-.725 1.088-1.638T17 10t-.363-1.912T15.55 6.45l.662-.662q.837.843 1.278 1.928q.44 1.086.44 2.283t-.44 2.283t-1.278 1.93m2.3 2.3l-.662-.662q1.175-1.175 1.813-2.687T20.3 10t-.638-3.162T17.85 4.15l.662-.662q1.313 1.317 2.016 2.99T21.231 10t-.703 3.522t-2.016 2.99"
        />
      </svg>
    </error>

    <player>
      <control>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            fill-rule="evenodd"
            d="M19.5 14.598c2-1.155 2-4.041 0-5.196l-9-5.196C8.5 3.05 6 4.494 6 6.804v10.392c0 2.31 2.5 3.753 4.5 2.598z"
            clip-rule="evenodd"
          />
        </svg>
      </control>
      <img />
      <div></div>
    </player>

    <track-block>
      <track-info>
        <div><track-album></track-album> • <track-year></track-year></div>
        <div><track-artist></track-artist> — <track-title></track-title></div>
      </track-info>
      <volume>
        <input type="range" min="0" max="100" value="100" step="1" />
      </volume>
    </track-block>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
